<!-- @dsCard group="Components" name="Blockquote" -->
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QARA · Blockquote</title>
<style>
  :root{--qara-ink:#29292a;--qara-taupe:#a28a7f;--qara-gray-050:#f1f1f2;--qara-gray-600:#7a7a7a;--qara-white:#fff;--radius:24px;--display:"Telegraf",Arial,sans-serif;--body:"Roboto",Arial,Helvetica,sans-serif}
  *{box-sizing:border-box}
  body{margin:0;padding:44px;background:#fff;color:var(--qara-ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
  blockquote{background:var(--qara-gray-050);border-radius:var(--radius);margin:0;padding:38px}
  blockquote p{font-family:var(--display);font-size:1.25rem;font-weight:400;line-height:1.55;margin:0 0 18px}
  blockquote footer{color:var(--qara-gray-600);font-size:.75rem;letter-spacing:.02em}
  blockquote footer strong{color:var(--qara-ink);font-weight:600}
</style>
</head>
<body>
  <blockquote>
    <p>“A dermatologia bem conduzida começa por ouvir. Diagnóstico preciso e conduta individualizada são a base de qualquer resultado seguro.”</p>
    <footer><strong>Dra. Manuela Ávila</strong> · Dermatologia clínica · CRM-RJ 000000</footer>
  </blockquote>
</body>
</html>
