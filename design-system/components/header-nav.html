<!-- @dsCard group="Components" name="Header / nav" -->
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QARA · Header</title>
<style>
  :root{--qara-ink:#29292a;--qara-taupe:#a28a7f;--qara-gray-050:#f1f1f2;--qara-white:#fff;--display:"Telegraf",Arial,sans-serif;--body:"Roboto",Arial,Helvetica,sans-serif}
  *{box-sizing:border-box}
  body{margin:0;padding:40px;background:var(--qara-gray-050);font-family:var(--body);-webkit-font-smoothing:antialiased}
  .site-header{background:rgba(255,255,255,.94);border-bottom:1px solid rgba(162,138,127,.2);backdrop-filter:blur(14px);border-radius:14px}
  .header-inner{align-items:center;display:flex;justify-content:space-between;min-height:82px;padding-inline:28px}
  .wordmark{color:var(--qara-ink);font-family:var(--display);font-size:1.65rem;letter-spacing:.13em;line-height:.85;text-decoration:none}
  .wordmark span{display:block;font-family:var(--body);font-size:.43rem;font-weight:600;letter-spacing:.18em;margin-top:9px;text-transform:uppercase}
  .desktop-nav{display:flex;gap:28px;font-size:.86rem}
  .desktop-nav a{color:var(--qara-ink);text-decoration:none;align-items:center;display:inline-flex;min-height:44px}
  .desktop-nav a:hover{color:var(--qara-taupe)}
  .header-cta{border:1px solid var(--qara-taupe);border-radius:999px;color:var(--qara-ink);font-size:.84rem;font-weight:600;padding:12px 22px;text-decoration:none;align-items:center;display:inline-flex;min-height:44px}
  @media(max-width:720px){.desktop-nav{display:none}}
</style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="wordmark" href="#">QARA<span>clínica dermatológica</span></a>
      <nav class="desktop-nav">
        <a href="#">Especialidades ⌄</a><a href="#">Equipe</a><a href="#">Clínica</a><a href="#">Conteúdo</a>
      </nav>
      <a class="header-cta" href="#">Agendar pelo WhatsApp</a>
    </div>
  </header>
</body>
</html>
