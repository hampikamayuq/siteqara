<!-- @dsCard group="Foundations" name="Radii" -->
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QARA · Radii</title>
<style>
  :root{--qara-ink:#29292a;--qara-taupe:#a28a7f;--qara-muted:#6d6d6f;--qara-blush-soft:#fff1eb;--qara-gray-200:#d0d2d3;--qara-white:#fff;--body:"Roboto",Arial,Helvetica,sans-serif}
  *{box-sizing:border-box}
  body{margin:0;padding:40px;background:var(--qara-white);color:var(--qara-ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
  h1{font-family:"Telegraf",Arial,sans-serif;font-size:1.6rem;font-weight:400;letter-spacing:-.02em;margin:0 0 4px}
  .sub{color:var(--qara-muted);font-size:.85rem;margin:0 0 30px;max-width:58ch}
  .radii{display:flex;flex-wrap:wrap;gap:28px}
  .r{text-align:center}
  .r div{width:132px;height:98px;background:var(--qara-blush-soft);border:1px solid var(--qara-gray-200)}
  .r p{font-size:.85rem;font-weight:600;margin:13px 0 2px}
  .r small{color:var(--qara-muted);font-family:ui-monospace,Menlo,monospace;font-size:.74rem}
  .r em{display:block;color:#5f5f61;font-style:normal;font-size:.78rem;margin-top:4px}
</style>
</head>
<body>
  <h1>Raios</h1>
  <p class="sub">Pill (999px) é exclusivo de ações. Cartões consolidados usam 24px; cartões novos preferem 12–16px.</p>
  <div class="radii">
    <div class="r"><div style="border-radius:24px"></div><p>Surface</p><small>24px</small><em>Cartões consolidados</em></div>
    <div class="r"><div style="border-radius:14px"></div><p>Compact</p><small>12–16px</small><em>Cartões novos</em></div>
    <div class="r"><div style="border-radius:999px"></div><p>Pill</p><small>999px</small><em>Apenas ações</em></div>
  </div>
</body>
</html>
