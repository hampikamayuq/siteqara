<!-- @dsCard group="Foundations" name="Spacing" -->
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QARA · Spacing</title>
<style>
  :root{--qara-ink:#29292a;--qara-taupe:#a28a7f;--qara-muted:#6d6d6f;--qara-white:#fff;--body:"Roboto",Arial,Helvetica,sans-serif}
  *{box-sizing:border-box}
  body{margin:0;padding:40px;background:var(--qara-white);color:var(--qara-ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
  h1{font-family:"Telegraf",Arial,sans-serif;font-size:1.6rem;font-weight:400;letter-spacing:-.02em;margin:0 0 4px}
  .sub{color:var(--qara-muted);font-size:.85rem;margin:0 0 30px;max-width:58ch}
  .scale{display:grid;gap:14px}
  .row{display:grid;grid-template-columns:70px 96px 1fr;gap:20px;align-items:center}
  .row code{font-family:ui-monospace,Menlo,monospace;font-size:.78rem}
  .row span{color:var(--qara-muted);font-size:.76rem}
  .bar{background:#a28a7f;border-radius:3px;height:16px}
</style>
</head>
<body>
  <h1>Espaçamento</h1>
  <p class="sub">Escala progressiva para ritmo vertical e respiro entre blocos. Seções respiram com 112px no desktop.</p>
  <div class="scale">
    <div class="row"><code>4px</code><span>2xs</span><i class="bar" style="width:4px"></i></div>
    <div class="row"><code>8px</code><span>xs</span><i class="bar" style="width:8px"></i></div>
    <div class="row"><code>12px</code><span>sm</span><i class="bar" style="width:12px"></i></div>
    <div class="row"><code>24px</code><span>md</span><i class="bar" style="width:24px"></i></div>
    <div class="row"><code>48px</code><span>lg</span><i class="bar" style="width:48px"></i></div>
    <div class="row"><code>72px</code><span>xl</span><i class="bar" style="width:72px"></i></div>
    <div class="row"><code>96px</code><span>2xl</span><i class="bar" style="width:96px"></i></div>
  </div>
</body>
</html>
